<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>White Noise</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;

      /* Background image setup */
      background-image: url('assets/background.jpeg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;

      font-family: 'Helvetica Neue', Arial, sans-serif;
      color: #fff;
      padding: 0 0 6rem 0;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin: 8vh 0 10vh 0;
    }

    .title-row img {
      width: 6vw;
      height: 6vw;
      min-width: 56px;
      min-height: 56px;
      object-fit: contain;
    }

    h1.title {
      font-family: Impact, 'Arial Narrow Bold', sans-serif;
      font-size: 7vw;
      letter-spacing: 4px;
      text-align: center;
      color: #fff;
      text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
      margin: 0;
    }

    .artist {
      max-width: 640px;
      margin: 0 auto 3rem auto;
      padding: 1.5rem 1.75rem;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .artist h2 {
      font-family: Impact, 'Arial Narrow Bold', sans-serif;
      font-size: 2.4rem;
      letter-spacing: 2px;
      margin: 0 0 1.5rem 0;
    }

    .track {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding: 1rem 0;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
    }

    .track:last-child {
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }

    .track img {
      width: 96px;
      height: 96px;
      object-fit: cover;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    .track-info {
      flex: 1;
      min-width: 0;
    }

    .track-info p {
      margin: 0 0 0.35rem 0;
      font-size: 1.25rem;
    }

    .track a {
      color: #fff;
      font-size: 1rem;
      text-decoration: underline;
      text-underline-offset: 3px;
      opacity: 0.9;
    }

    .track a:hover {
      opacity: 1;
    }

    .drive-section {
      max-width: 640px;
      margin: 0 auto 3rem auto;
      padding: 1.5rem 1.75rem;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .drive-section h2 {
      font-family: Impact, 'Arial Narrow Bold', sans-serif;
      font-size: 2.4rem;
      letter-spacing: 2px;
      margin: 0 0 0.75rem 0;
    }

    .drive-section a {
      color: #fff;
      font-size: 1.1rem;
      text-decoration: underline;
      text-underline-offset: 3px;
      opacity: 0.9;
    }

    .drive-section a:hover {
      opacity: 1;
    }

    .support-wrap {
      max-width: 640px;
      margin: 0 auto 4rem auto;
      padding: 0 1.5rem;
      text-align: center;
    }

    .support-btn {
      display: inline-block;
      font-family: Impact, 'Arial Narrow Bold', sans-serif;
      letter-spacing: 3px;
      font-size: 1.3rem;
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid #fff;
      padding: 0.75rem 2.5rem;
      text-decoration: none;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .support-btn:hover {
      background: #fff;
      color: #000;
    }

    .contact {
      max-width: 640px;
      margin: 0 auto;
      padding: 1.5rem 1.75rem;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .contact h2 {
      font-family: Impact, 'Arial Narrow Bold', sans-serif;
      font-size: 2.4rem;
      letter-spacing: 2px;
      margin: 0 0 0.75rem 0;
    }

    .contact p {
      margin: 0.35rem 0;
      font-size: 1.05rem;
    }

    .contact a {
      color: #fff;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
  </style>
</head>
<body>

  <div class="title-row">

  <section class="contact">
